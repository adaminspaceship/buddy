name: Buddy
options:
  bundleIdPrefix: com.trycaret.buddy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  schemePathPrefix: ""

schemes:
  Buddy:
    build:
      targets:
        Buddy: all
    run:
      config: Debug
      executable: Buddy
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Buddy:
    type: application
    platform: iOS
    sources:
      - path: Buddy
    info:
      path: Buddy/Info.plist
      properties:
        CFBundleDisplayName: Buddy
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - processing
          - fetch
        NSMicrophoneUsageDescription: "Buddy keeps a rolling buffer of recent audio so you can capture a moment with your Action Button and send it to your agent."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: com.trycaret.buddy.configure
            CFBundleURLSchemes:
              - buddy
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UIRequiredDeviceCapabilities:
          - armv7
          - microphone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trycaret.buddy
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
